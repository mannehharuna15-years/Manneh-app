<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Manneh</title>
<meta name="description" content="Manneh — an AI assistant that can answer all your questions." />
<meta name="theme-color" content="#0F1417" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0F1417;
    color: #E8E6E1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }
  header {
    border-bottom: 1px solid #2A3236;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .logo {
    width: 32px; height: 32px; border-radius: 50%;
    background: #5B8C7B; color: #0F1417;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px;
  }
  .title { font-size: 17px; letter-spacing: 0.02em; line-height: 1; }
  .subtitle { font-size: 11px; color: #7A8A85; margin-top: 3px; }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .empty { color: #4A5458; font-size: 14px; font-style: italic; text-align: center; margin-top: 32px; }
  .row { display: flex; }
  .row.user { justify-content: flex-end; }
  .row.model { justify-content: flex-start; }
  .bubble {
    max-width: 80%;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .row.user .bubble { background: #5B8C7B; color: #0F1417; }
  .row.model .bubble { background: #1C2427; color: #E8E6E1; }
  .thinking { color: #7A8A85; }
  .error { text-align: center; color: #D97757; font-size: 12px; padding: 6px 0; }
  form#inputBar {
    border-top: 1px solid #2A3236;
    padding: 10px 18px;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  textarea#input {
    flex: 1;
    resize: none;
    background: #1C2427;
    border: 1px solid #2A3236;
    border-radius: 6px;
    padding: 10px 12px;
    color: #E8E6E1;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  textarea#input:focus { border-color: #5B8C7B; }
  button#sendBtn {
    padding: 0 18px;
    background: #5B8C7B;
    color: #0F1417;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button#sendBtn:disabled { opacity: 0.5; cursor: default; }
  button#sendBtn:hover:not(:disabled) { background: #6FA090; }
</style>
</head>
<body>

<header>
  <div class="logo">M</div>
  <div>
    <div class="title">Manneh</div>
    <div class="subtitle">powered by Gemini</div>
  </div>
</header>

<div id="messages">
  <div class="empty">Ask Manneh anything.</div>
</div>

<form id="inputBar">
  <textarea id="input" rows="1" placeholder="Type a message…"></textarea>
  <button id="sendBtn" type="submit">Send</button>
</form>

<script>
  // This app calls YOUR OWN backend proxy (see /server folder) so the Gemini
  // API key never lives in the browser. Set this to your deployed backend URL.
  const BACKEND_URL = "/api/chat"; // e.g. "https://your-backend.example.com/api/chat"

  const messagesEl = document.getElementById("messages");
  const form = document.getElementById("inputBar");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");

  let history = [];
  let loading = false;

  function render() {
    messagesEl.innerHTML = "";
    if (history.length === 0) {
      messagesEl.innerHTML = '<div class="empty">Ask Manneh anything.</div>';
    }
    history.forEach((m) => {
      const row = document.createElement("div");
      row.className = "row " + m.role;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = m.text;
      row.appendChild(bubble);
      messagesEl.appendChild(row);
    });
    if (loading) {
      const row = document.createElement("div");
      row.className = "row model";
      row.innerHTML = '<div class="bubble thinking">thinking…</div>';
      messagesEl.appendChild(row);
    }
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showError(msg) {
    const div = document.createElement("div");
    div.className = "error";
    div.textContent = msg;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage(text) {
    history.push({ role: "user", text });
    render();
    loading = true;
    render();

    try {
      const res = await fetch(BACKEND_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ history }),
      });
      const data = await res.json();
      loading = false;

      if (!res.ok) {
        render();
        showError(data.error || "Request failed.");
        return;
      }
      history.push({ role: "model", text: data.reply });
      render();
    } catch (e) {
      loading = false;
      render();
      showError("Network error — check your connection and try again.");
    }
  }

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text || loading) return;
    input.value = "";
    sendMessage(text);
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    });
  }
</script>
</body>
</html>
